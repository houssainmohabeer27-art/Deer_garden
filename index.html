<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Sanctuary — Pet the Deer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --crimson-deep: #1a0008;
    --crimson-mid: #3d0015;
    --crimson-rose: #6b0020;
    --crimson-bright: #8b0025;
    --rose-blush: #c0425a;
    --petal-light: #e8a0b0;
    --gold: #d4a84b;
    --cream: #f5e6d0;
    --fawn-light: #c9956a;
    --fawn-mid: #a0703a;
    --text-soft: #f0d8c8;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--crimson-deep);
    font-family: 'Lato', sans-serif;
    color: var(--text-soft);
    user-select: none;
  }

  /* ─── ROSE BACKGROUND ─── */
  #canvas-bg {
    position: fixed; inset: 0;
    z-index: 0;
  }

  /* ─── SCENE ─── */
  #scene {
    position: fixed; inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 20px;
  }

  /* ─── GROUND ─── */
  #ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, #2a0010 60%, transparent 100%);
    z-index: 2;
  }

  /* ─── FLOATING PETALS ─── */
  .petal {
    position: fixed;
    width: 8px; height: 12px;
    background: var(--rose-blush);
    border-radius: 50% 50% 50% 0 / 60% 60% 40% 40%;
    opacity: 0;
    z-index: 3;
    pointer-events: none;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0.7; }
    80% { opacity: 0.5; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  /* ─── DEER SVG WRAPPER ─── */
  #deer-container {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    cursor: pointer;
    width: 280px;
    transition: filter 0.3s;
  }
  #deer-container:hover { filter: brightness(1.08); }

  /* Ear wiggle */
  @keyframes earWiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-12deg); }
    75% { transform: rotate(8deg); }
  }
  .ear-group { transform-origin: 50% 80%; }
  .ear-group.wiggle { animation: earWiggle 0.4s ease-in-out 3; }

  /* Tail wag */
  @keyframes tailWag {
    0%,100% { transform: rotate(0deg); }
    50% { transform: rotate(20deg); }
  }
  #deer-tail { transform-origin: 10% 50%; }
  #deer-tail.wagging { animation: tailWag 0.3s ease-in-out 6; }

  /* Body bounce */
  @keyframes bodyBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  #deer-body.bounce { animation: bodyBounce 0.5s ease-in-out 2; }

  /* Heart float */
  @keyframes heartFloat {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    60% { opacity: 1; }
    100% { transform: translate(-50%, calc(-50% - 70px)) scale(1.4); opacity: 0; }
  }
  .heart-pop {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    animation: heartFloat 1s ease-out forwards;
    z-index: 30;
  }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 28px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    background: linear-gradient(to bottom, rgba(26,0,8,0.95) 0%, transparent 100%);
  }

  #title-hud {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    color: var(--petal-light);
  }
  #title-hud span { color: var(--gold); font-style: italic; }

  #stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(139,0,37,0.4);
    border: 1px solid rgba(224,100,130,0.3);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--petal-light);
  }
  .stat-icon { font-size: 1rem; }

  /* ─── MOOD BAR ─── */
  #mood-bar-wrap {
    position: fixed;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
  }
  #mood-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--petal-light);
    margin-bottom: 4px;
  }
  #mood-track {
    width: 180px; height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.15);
    overflow: hidden;
  }
  #mood-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(to right, #c0425a, #e87d9a, #ffd0de);
    transition: width 0.6s ease;
  }
  #mood-emoji {
    font-size: 1.2rem;
    margin-top: 4px;
    transition: opacity 0.3s;
  }

  /* ─── ACTION BUTTONS ─── */
  #actions {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .action-btn {
    background: rgba(61,0,21,0.75);
    border: 1.5px solid rgba(192,66,90,0.5);
    border-radius: 18px;
    padding: 12px 22px;
    color: var(--petal-light);
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 76px;
    backdrop-filter: blur(8px);
  }
  .action-btn .btn-icon { font-size: 1.5rem; }
  .action-btn:hover {
    background: rgba(139,0,37,0.7);
    border-color: var(--rose-blush);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(192,66,90,0.3);
  }
  .action-btn:active { transform: translateY(0) scale(0.97); }
  .action-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  /* ─── SPEECH BUBBLE ─── */
  #speech {
    position: absolute;
    bottom: calc(100% + 18px);
    left: 50%;
    transform: translateX(-40%);
    background: rgba(245,230,208,0.97);
    color: var(--crimson-deep);
    border-radius: 18px 18px 18px 4px;
    padding: 10px 16px;
    font-size: 0.88rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    max-width: 220px;
    line-height: 1.5;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 25;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #speech.visible { opacity: 1; }

  /* ─── MUSIC TOGGLE ─── */
  #music-btn {
    position: fixed;
    top: 18px; right: 24px;
    z-index: 30;
    background: rgba(61,0,21,0.7);
    border: 1px solid rgba(192,66,90,0.4);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
    color: var(--petal-light);
  }
  #music-btn:hover { background: rgba(139,0,37,0.8); }

  /* ─── FOOD ITEMS FLYING ─── */
  .food-throw {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 40;
    animation: throwArc 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes throwArc {
    0% { transform: translate(0,0) scale(1) rotate(0deg); }
    40% { transform: translate(calc(var(--tx) * 0.5), calc(var(--ty) * 0.5 - 60px)) scale(1.1) rotate(180deg); }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(360deg); opacity: 0.3; }
  }

  /* ─── SPARKLE ─── */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 35;
    animation: sparkleOut 0.8s ease-out forwards;
  }
  @keyframes sparkleOut {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
  }

  /* ─── INTRO SPLASH ─── */
  #intro {
    position: fixed; inset: 0;
    z-index: 100;
    background: var(--crimson-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #intro h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--petal-light);
    text-align: center;
    line-height: 1.2;
  }
  #intro h1 em { color: var(--gold); font-style: italic; }
  #intro p {
    font-size: 0.95rem;
    color: rgba(240,216,200,0.7);
    letter-spacing: 0.08em;
    text-align: center;
  }
  #start-btn {
    margin-top: 12px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--rose-blush);
    border-radius: 999px;
    color: var(--petal-light);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  #start-btn:hover {
    background: rgba(192,66,90,0.25);
    border-color: var(--petal-light);
    transform: scale(1.04);
  }

  /* ─── NOTIFICATION TOAST ─── */
  #toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(245,230,208,0.95);
    color: var(--crimson-deep);
    padding: 8px 20px;
    border-radius: 99px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.9rem;
    opacity: 0;
    transition: all 0.4s;
    pointer-events: none;
    z-index: 50;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── DEER EYES BLINK ─── */
  @keyframes blink {
    0%,96%,100% { transform: scaleY(1); }
    98% { transform: scaleY(0.1); }
  }
  #deer-eye { animation: blink 4s ease-in-out infinite; transform-origin: center; }

  /* ─── GRASS/FLOWERS ─── */
  .grass-blade {
    position: absolute;
    bottom: 0;
    width: 3px;
    border-radius: 99px 99px 0 0;
    background: linear-gradient(to top, #3d0015, #6b0020);
  }
</style>
</head>
<body>

<!-- Rose background canvas -->
<canvas id="canvas-bg"></canvas>

<!-- Intro splash -->
<div id="intro">
  <h1>BAMBI<br><em>Sanctuary</em></h1>
  <p>A quiet place to care for a little fawn</p>
  <button id="start-btn">Enter the Garden ✿</button>
</div>

<!-- Main scene -->
<div id="scene">
  <div id="ground"></div>

  <!-- HUD top -->
  <div id="hud">
    <div id="title-hud">Rose <span>Sanctuary</span></div>
    <div id="stats">
      <div class="stat-pill"><span class="stat-icon">🌿</span><span id="treats-count">5</span> treats</div>
      <div class="stat-pill"><span class="stat-icon">✨</span><span id="score-count">0</span> joy</div>
    </div>
  </div>

  <!-- Mood bar -->
  <div id="mood-bar-wrap">
    <div id="mood-label">Deer Mood</div>
    <div id="mood-track"><div id="mood-fill" style="width:50%"></div></div>
    <div id="mood-emoji">😊</div>
  </div>

  <!-- Music toggle -->
  <button id="music-btn" title="Toggle sound">🔊</button>

  <!-- Deer SVG -->
  <div id="deer-container">
    <!-- Speech bubble -->
    <div id="speech">Hello there! ♥</div>

    <svg id="deer-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible;">
      <defs>
        <radialGradient id="gFawn" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#d4a870"/>
          <stop offset="100%" stop-color="#8b5e2a"/>
        </radialGradient>
        <radialGradient id="gBelly" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#e8c89a"/>
          <stop offset="100%" stop-color="#c8955a"/>
        </radialGradient>
        <radialGradient id="gNose" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#c06080"/>
          <stop offset="100%" stop-color="#7a3040"/>
        </radialGradient>
        <filter id="softShadow" x="-20%" y="-10%" width="140%" height="140%">
          <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a0008" flood-opacity="0.6"/>
        </filter>
      </defs>

      <!-- Shadow -->
      <ellipse cx="140" cy="265" rx="70" ry="10" fill="rgba(0,0,0,0.35)"/>

      <!-- BODY GROUP (for bounce) -->
      <g id="deer-body" filter="url(#softShadow)">

        <!-- TAIL -->
        <g id="deer-tail">
          <ellipse cx="210" cy="185" rx="14" ry="20" fill="#e8d0b0" transform="rotate(-20,210,185)"/>
          <ellipse cx="210" cy="183" rx="9" ry="14" fill="#f5ede0" transform="rotate(-20,210,183)"/>
        </g>

        <!-- BODY -->
        <ellipse cx="140" cy="195" rx="80" ry="55" fill="url(#gFawn)"/>
        <!-- Belly patch -->
        <ellipse cx="140" cy="210" rx="45" ry="30" fill="url(#gBelly)" opacity="0.7"/>

        <!-- SPOTS -->
        <ellipse cx="115" cy="185" rx="7" ry="5" fill="rgba(255,255,240,0.55)" transform="rotate(-10,115,185)"/>
        <ellipse cx="145" cy="175" rx="5" ry="4" fill="rgba(255,255,240,0.55)" transform="rotate(5,145,175)"/>
        <ellipse cx="168" cy="190" rx="6" ry="4" fill="rgba(255,255,240,0.5)" transform="rotate(-5,168,190)"/>
        <ellipse cx="130" cy="200" rx="4" ry="3" fill="rgba(255,255,240,0.45)"/>
        <ellipse cx="158" cy="207" rx="5" ry="3.5" fill="rgba(255,255,240,0.4)"/>

        <!-- LEGS — back pair -->
        <rect x="96" y="232" width="18" height="36" rx="6" fill="#9a6530"/>
        <rect x="155" y="232" width="18" height="36" rx="6" fill="#9a6530"/>
        <!-- Hooves back -->
        <ellipse cx="105" cy="268" rx="11" ry="5" fill="#4a2810"/>
        <ellipse cx="164" cy="268" rx="11" ry="5" fill="#4a2810"/>

        <!-- LEGS — front pair -->
        <rect x="108" y="228" width="16" height="34" rx="6" fill="#b07840"/>
        <rect x="142" y="228" width="16" height="34" rx="6" fill="#b07840"/>
        <!-- Hooves front -->
        <ellipse cx="116" cy="262" rx="10" ry="4.5" fill="#4a2810"/>
        <ellipse cx="150" cy="262" rx="10" ry="4.5" fill="#4a2810"/>

        <!-- NECK -->
        <ellipse cx="108" cy="155" rx="28" ry="38" fill="url(#gFawn)" transform="rotate(-15,108,155)"/>

        <!-- HEAD -->
        <ellipse cx="92" cy="120" rx="38" ry="34" fill="url(#gFawn)"/>
        <!-- Snout -->
        <ellipse cx="72" cy="130" rx="18" ry="13" fill="#c8955a"/>
        <!-- Nose -->
        <ellipse cx="64" cy="128" rx="8" ry="6" fill="url(#gNose)"/>
        <!-- Nostril -->
        <ellipse cx="62" cy="128" rx="3" ry="2" fill="rgba(0,0,0,0.4)"/>

        <!-- EYE -->
        <g id="deer-eye">
          <ellipse cx="100" cy="112" rx="9" ry="9" fill="#2a1408"/>
          <ellipse cx="103" cy="109" rx="4" ry="4" fill="#5a3018"/>
          <circle cx="104" cy="108" r="2" fill="white" opacity="0.9"/>
          <circle cx="98" cy="113" r="1" fill="white" opacity="0.5"/>
          <!-- Lashes -->
          <line x1="100" y1="103" x2="99" y2="98" stroke="#2a1408" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="104" y1="104" x2="105" y2="99" stroke="#2a1408" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="108" y1="107" x2="111" y2="103" stroke="#2a1408" stroke-width="1" stroke-linecap="round"/>
        </g>

        <!-- LEFT EAR -->
        <g class="ear-group" id="ear-left">
          <ellipse cx="78" cy="94" rx="10" ry="22" fill="#b07840" transform="rotate(-25,78,94)"/>
          <ellipse cx="78" cy="94" rx="6" ry="15" fill="#e8c090" opacity="0.8" transform="rotate(-25,78,94)"/>
        </g>
        <!-- RIGHT EAR -->
        <g class="ear-group" id="ear-right">
          <ellipse cx="114" cy="90" rx="10" ry="22" fill="#b07840" transform="rotate(15,114,90)"/>
          <ellipse cx="114" cy="90" rx="6" ry="15" fill="#e8c090" opacity="0.8" transform="rotate(15,114,90)"/>
        </g>

        <!-- BOW — crimson ribbon -->
        <g id="deer-bow" transform="translate(100,86) rotate(-15)">
          <!-- Left wing -->
          <ellipse cx="-12" cy="0" rx="12" ry="8" fill="#8b0025" transform="rotate(-30,-12,0)"/>
          <ellipse cx="-12" cy="0" rx="9" ry="5" fill="#c0425a" opacity="0.6" transform="rotate(-30,-12,0)"/>
          <!-- Right wing -->
          <ellipse cx="12" cy="0" rx="12" ry="8" fill="#8b0025" transform="rotate(30,12,0)"/>
          <ellipse cx="12" cy="0" rx="9" ry="5" fill="#c0425a" opacity="0.6" transform="rotate(30,12,0)"/>
          <!-- Center knot -->
          <ellipse cx="0" cy="0" rx="5" ry="5" fill="#6b0020"/>
          <ellipse cx="0" cy="0" rx="3" ry="3" fill="#c0425a"/>
        </g>

      </g><!-- end deer-body -->
    </svg>
  </div><!-- end deer-container -->

  <!-- Action buttons -->
  <div id="actions">
    <button class="action-btn" id="btn-feed" onclick="feedDeer()">
      <span class="btn-icon">🍎</span>
      <span>Feed</span>
    </button>
    <button class="action-btn" id="btn-pet" onclick="petDeer()">
      <span class="btn-icon">🤚</span>
      <span>Pet</span>
    </button>
    <button class="action-btn" id="btn-play" onclick="playWithDeer()">
      <span class="btn-icon">🌸</span>
      <span>Play</span>
    </button>
    <button class="action-btn" id="btn-gift" onclick="giftDeer()">
      <span class="btn-icon">🎀</span>
      <span>Gift</span>
    </button>
    <button class="action-btn" id="btn-refill" onclick="refillTreats()">
      <span class="btn-icon">🌿</span>
      <span>Forage</span>
    </button>
  </div>
</div><!-- end scene -->

<!-- Toast notification -->
<div id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
let mood = 50;
let treats = 5;
let joy = 0;
let audioCtx = null;
let musicOn = false;
let gameStarted = false;
let speechTimeout = null;
let actionCooldown = false;

const moodEmojis = [
  { at: 0,  e: '😔' },
  { at: 20, e: '😕' },
  { at: 40, e: '🙂' },
  { at: 60, e: '😊' },
  { at: 75, e: '😄' },
  { at: 90, e: '🥰' },
];

const feedPhrases = [
  "Mmm, yummy! 🍎",
  "Oh thank you! ✨",
  "More please? 🥺",
  "So delicious! 💕",
  "You're so kind! 🌸",
];
const petPhrases = [
  "That feels nice... ♥",
  "Purr... I mean... *snort* 🦌",
  "Don't stop! 💖",
  "So gentle... 🌸",
  "Best day ever! ✨",
];
const playPhrases = [
  "Weee! Let's play! 🌸",
  "I love petals! 💕",
  "So fun! 🎀",
  "Again, again! ✨",
  "You're my favourite! 🥰",
];
const giftPhrases = [
  "For me?! 🎀",
  "A ribbon! So pretty! 💖",
  "You're so sweet! 🌸",
  "I'll treasure this! ✨",
];
const lowMoodPhrases = [
  "I'm a little lonely... 🥺",
  "Feed me? Pretty please? 🌿",
  "Come play with me... 💔",
];

// ─── ROSE BACKGROUND CANVAS ─────────────────────────────
function drawRoses() {
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Base fill
  ctx.fillStyle = '#1a0008';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Radial vignette
  const vigGrad = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height*0.2,
    canvas.width/2, canvas.height/2, canvas.height*0.9
  );
  vigGrad.addColorStop(0, 'rgba(61,0,21,0.6)');
  vigGrad.addColorStop(1, 'rgba(10,0,4,0.95)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw tiled roses
  const roseSize = 80;
  const cols = Math.ceil(canvas.width / roseSize) + 2;
  const rows = Math.ceil(canvas.height / roseSize) + 2;

  for (let r = -1; r < rows; r++) {
    for (let c = -1; c < cols; c++) {
      const x = c * roseSize + (r % 2 === 0 ? 0 : roseSize * 0.5);
      const y = r * roseSize * 0.85;
      drawRose(ctx, x + roseSize/2, y + roseSize/2, roseSize * 0.38,
        r * 31 + c * 17);
    }
  }

  // Dark overlay to push roses back
  const overlay = ctx.createRadialGradient(
    canvas.width*0.5, canvas.height*0.4, 0,
    canvas.width*0.5, canvas.height*0.4, canvas.height*0.7
  );
  overlay.addColorStop(0, 'rgba(30,0,12,0.35)');
  overlay.addColorStop(1, 'rgba(10,0,4,0.75)');
  ctx.fillStyle = overlay;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawRose(ctx, cx, cy, r, seed) {
  const rng = mulberry32(seed);
  const petals = 5 + Math.floor(rng() * 4);
  const layers = 3 + Math.floor(rng() * 2);
  const hue = 340 + rng() * 20 - 10;
  const baseAlpha = 0.08 + rng() * 0.12;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rng() * Math.PI * 2);

  for (let l = layers; l >= 0; l--) {
    const layerR = r * (0.35 + l * 0.22);
    const offset = (l * Math.PI * 0.4);
    const alpha = baseAlpha * (1 - l * 0.12);
    const darkness = 25 + l * 10;

    for (let p = 0; p < petals; p++) {
      const angle = (p / petals) * Math.PI * 2 + offset;
      ctx.save();
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(
        layerR * 0.6, -layerR * 0.4,
        layerR * 0.9, layerR * 0.1,
        layerR * 0.5, layerR * 0.6
      );
      ctx.bezierCurveTo(
        layerR * 0.2, layerR * 0.9,
        -layerR * 0.2, layerR * 0.7,
        0, 0
      );
      ctx.fillStyle = `hsla(${hue}, 80%, ${darkness}%, ${alpha})`;
      ctx.fill();
      ctx.strokeStyle = `hsla(${hue}, 60%, ${darkness + 10}%, ${alpha * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.restore();
    }
  }
  // Center
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${hue - 20}, 70%, 15%, ${baseAlpha * 1.5})`;
  ctx.fill();

  ctx.restore();
}

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── PETALS ──────────────────────────────────────────────
function spawnPetal() {
  const petal = document.createElement('div');
  petal.className = 'petal';
  const hue = 330 + Math.random() * 30;
  petal.style.left = Math.random() * 100 + 'vw';

setInterval(spawnPetal, 800);

// ─── AUDIO ENGINE ────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startMusic();
  startBirds();
  musicOn = true;
}

function startMusic() {
  // Gentle pentatonic melody loop
  const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
  const melody = [0,2,4,5,2,0,4,2,5,4,2,0, 5,4,2,0,2,4,5,4];
  const tempo = 0.38;
  let time = audioCtx.currentTime + 0.5;

  function playMelody() {
    melody.forEach((noteIdx, i) => {
      // Melody note
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(notes[noteIdx], time + i * tempo);
      gain.gain.setValueAtTime(0, time + i * tempo);
      gain.gain.linearRampToValueAtTime(0.06, time + i * tempo + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, time + i * tempo + tempo * 0.85);
      osc.start(time + i * tempo);
      osc.stop(time + i * tempo + tempo);

      // Harmonics (one octave up, softer)
      if (i % 3 === 0) {
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2); gain2.connect(audioCtx.destination);
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(notes[noteIdx] * 2, time + i * tempo);
        gain2.gain.setValueAtTime(0.025, time + i * tempo);
        gain2.gain.exponentialRampToValueAtTime(0.001, time + i * tempo + tempo * 0.6);
        osc2.start(time + i * tempo);
        osc2.stop(time + i * tempo + tempo);
      }
    });

    // Schedule next loop
    const loopDuration = melody.length * tempo;
    time += loopDuration;
    if (musicOn) setTimeout(playMelody, loopDuration * 1000 - 300);
  }

  // Gentle bass pad
  function playPad() {
    const padFreqs = [130.81, 164.81, 196.00, 261.63];
    padFreqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 2);
      gain.gain.linearRampToValueAtTime(0.018, audioCtx.currentTime + i * 2 + 1);
      gain.gain.linearRampToValueAtTime(0.012, audioCtx.currentTime + i * 2 + 6);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 2 + 8);
      osc.start(audioCtx.currentTime + i * 2);
      osc.stop(audioCtx.currentTime + i * 2 + 9);
    });
    if (musicOn) setTimeout(playPad, 8000);
  }

  playMelody();
  playPad();
}

function startBirds() {
  function chirp() {
    if (!musicOn) return;
    const baseFreq = 800 + Math.random() * 1200;
    const chirps = 2 + Math.floor(Math.random() * 4);
    let t = audioCtx.currentTime + Math.random() * 0.5;
    for (let i = 0; i < chirps; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = baseFreq;
      filter.Q.value = 3;
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, t + i * 0.12);
      osc.frequency.linearRampToValueAtTime(baseFreq * (1.1 + Math.random() * 0.3), t + i * 0.12 + 0.06);
      gain.gain.setValueAtTime(0, t + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.04 + Math.random() * 0.03, t + i * 0.12 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.09);
      osc.start(t + i * 0.12);
      osc.stop(t + i * 0.12 + 0.1);
    }
    // Schedule next bird call
    setTimeout(chirp, 1500 + Math.random() * 5000);
  }

  // Distant gentle wind
  function wind() {
    if (!musicOn) return;
    const bufSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 0.5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 3);
    source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    source.start();
  }

  // Distant soft water/stream
  function stream() {
    if (!musicOn) return;
    const bufSize = audioCtx.sampleRate * 3;
    const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer; source.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 1200; filter.Q.value = 0.3;
    const gain = audioCtx.createGain(); gain.gain.value = 0.012;
    source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    source.start();
  }

  chirp();
  setTimeout(chirp, 800);
  setTimeout(chirp, 2000);
  wind();
  stream();
}

function playSfx(type) {
  if (!audioCtx) return;
  if (type === 'eat') {
    const freqs = [440, 523, 659];
    freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.frequency.value = f; osc.type = 'sine';
      g.gain.setValueAtTime(0.07, audioCtx.currentTime + i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.08 + 0.2);
      osc.start(audioCtx.currentTime + i*0.08);
      osc.stop(audioCtx.currentTime + i*0.08 + 0.2);
    });
  } else if (type === 'pet') {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sine'; osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(659, audioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.05, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } else if (type === 'play') {
    [523,659,784,1047].forEach((f,i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.frequency.value = f; osc.type = 'triangle';
      g.gain.setValueAtTime(0.05, audioCtx.currentTime + i*0.1);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.1 + 0.25);
      osc.start(audioCtx.currentTime + i*0.1);
      osc.stop(audioCtx.currentTime + i*0.1 + 0.25);
    });
  }
}

// ─── GAME ACTIONS ─────────────────────────────────────────
function feedDeer() {
  if (actionCooldown) return;
  if (treats <= 0) { showToast("No treats! Try foraging 🌿"); return; }
  if (!gameStarted) return;

  treats--;
  mood = Math.min(100, mood + 18);
  joy += 10;
  updateUI();

  const foods = ['🍎','🫐','🥕','🍓','🌾'];
  const food = foods[Math.floor(Math.random() * foods.length)];
  throwFood(food);
  wiggleEars();
  bounceBody();
  spawnHearts(2);
  showSpeech(feedPhrases);
  playSfx('eat');
  setCooldown(1000);
}

function petDeer() {
  if (actionCooldown) return;
  if (!gameStarted) return;

  mood = Math.min(100, mood + 12);
  joy += 5;
  updateUI();

  wiggleEars();
  spawnHearts(3);
  spawnSparkles();
  showSpeech(petPhrases);
  playSfx('pet');
  setCooldown(700);
}

function playWithDeer() {
  if (actionCooldown) return;
  if (!gameStarted) return;

  mood = Math.min(100, mood + 8);
  joy += 8;
  updateUI();

  bounceBody();
  wagTail();
  spawnPetals(8);
  spawnHearts(1);
  showSpeech(playPhrases);
  playSfx('play');
  setCooldown(1200);
}

function giftDeer() {
  if (actionCooldown) return;
  if (!gameStarted) return;

  mood = Math.min(100, mood + 15);
  joy += 15;
  updateUI();

  wiggleEars();
  bounceBody();
  spawnHearts(5);
  spawnSparkles();
  showSpeech(giftPhrases);
  playSfx('play');
  showToast('The bow shimmers ✨');
  setCooldown(1500);
}

function refillTreats() {
  if (actionCooldown) return;
  if (!gameStarted) return;
  treats = Math.min(treats + 3, 10);
  updateUI();
  showToast('Found some treats in the garden! 🌿');
  setCooldown(3000);
  document.getElementById('btn-refill').classList.add('disabled');
  setTimeout(() => document.getElementById('btn-refill').classList.remove('disabled'), 3000);
}

function setCooldown(ms) {
  actionCooldown = true;
  setTimeout(() => actionCooldown = false, ms);
}

// ─── ANIMATIONS ──────────────────────────────────────────
function wiggleEars() {
  ['ear-left','ear-right'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('wiggle');
    void el.offsetWidth;
    el.classList.add('wiggle');
    el.addEventListener('animationend', () => el.classList.remove('wiggle'), {once:true});
  });
}

function bounceBody() {
  const el = document.getElementById('deer-body');
  el.classList.remove('bounce');
  void el.offsetWidth;
  el.classList.add('bounce');
  el.addEventListener('animationend', () => el.classList.remove('bounce'), {once:true});
}

function wagTail() {
  const el = document.getElementById('deer-tail');
  el.classList.remove('wagging');
  void el.offsetWidth;
  el.classList.add('wagging');
  el.addEventListener('animationend', () => el.classList.remove('wagging'), {once:true});
}

function spawnHearts(count) {
  const container = document.getElementById('deer-container');
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart-pop';
      h.textContent = i % 2 === 0 ? '💕' : '♥';
      h.style.left = (30 + Math.random() * 60) + '%';
      h.style.top = (30 + Math.random() * 30) + '%';
      h.style.color = `hsl(${340 + Math.random()*30}, 80%, 70%)`;
      container.appendChild(h);
      setTimeout(() => h.remove(), 1100);
    }, i * 150);
  }
}

function spawnSparkles() {
  const container = document.getElementById('deer-container');
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 8) * Math.PI * 2;
    const dist = 40 + Math.random() * 30;
    s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
    s.style.left = (40 + Math.random() * 20) + '%';
    s.style.top = (30 + Math.random() * 30) + '%';
    container.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

function spawnPetals(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(spawnPetal, i * 100);
  }
}

function throwFood(emoji) {
  const dc = document.getElementById('deer-container');
  const rect = dc.getBoundingClientRect();
  const food = document.createElement('div');
  food.className = 'food-throw';
  food.textContent = emoji;
  const startX = window.innerWidth * 0.15;
  const startY = window.innerHeight * 0.7;
  food.style.left = startX + 'px';
  food.style.top = startY + 'px';
  const tx = rect.left + rect.width * 0.4 - startX;
  const ty = rect.top + rect.height * 0.7 - startY;
  food.style.setProperty('--tx', tx + 'px');
  food.style.setProperty('--ty', ty + 'px');
  document.body.appendChild(food);
  setTimeout(() => food.remove(), 800);
}

// ─── SPEECH BUBBLE ───────────────────────────────────────
function showSpeech(phrases) {
  const el = document.getElementById('speech');
  el.textContent = phrases[Math.floor(Math.random() * phrases.length)];
  el.classList.add('visible');
  clearTimeout(speechTimeout);
  speechTimeout = setTimeout(() => el.classList.remove('visible'), 2800);
}

// ─── UI UPDATE ───────────────────────────────────────────
function updateUI() {
  document.getElementById('treats-count').textContent = treats;
  document.getElementById('score-count').textContent = joy;
  document.getElementById('mood-fill').style.width = mood + '%';

  // Mood emoji
  let emoji = '😊';
  for (const e of moodEmojis) {
    if (mood >= e.at) emoji = e.e;
  }
  document.getElementById('mood-emoji').textContent = emoji;

  // Feed button state
  document.getElementById('btn-feed').classList.toggle('disabled', treats <= 0);

  // Mood decay hint
  if (mood < 30 && Math.random() < 0.3) {
    showSpeech(lowMoodPhrases);
  }
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── CLICKING THE DEER ───────────────────────────────────
document.getElementById('deer-container').addEventListener('click', function(e) {
  if (!gameStarted) return;
  if (e.target.closest('#speech')) return;
  petDeer();
});

// ─── MOOD DECAY ──────────────────────────────────────────
setInterval(() => {
  if (!gameStarted) return;
  mood = Math.max(0, mood - 1);
  updateUI();
}, 5000);

// ─── RESIZE ──────────────────────────────────────────────
window.addEventListener('resize', drawRoses);

// ─── MUSIC TOGGLE ────────────────────────────────────────
document.getElementById('music-btn').addEventListener('click', () => {
  if (!audioCtx) {
    initAudio();
    document.getElementById('music-btn').textContent = '🔊';
    return;
  }
  if (musicOn) {
    audioCtx.suspend();
    musicOn = false;
    document.getElementById('music-btn').textContent = '🔇';
  } else {
    audioCtx.resume();
    musicOn = true;
    document.getElementById('music-btn').textContent = '🔊';
  }
});

// ─── START ───────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('intro').classList.add('hidden');
  gameStarted = true;
  setTimeout(() => {
    showSpeech(['Hello! I\'m so happy you\'re here! ♥']);
    wiggleEars();
    spawnHearts(3);
  }, 400);
  setTimeout(() => document.getElementById('intro').remove(), 1000);
});

// ─── INIT ─────────────────────────────────────────────────
drawRoses();
updateUI();

// Idle animations
setInterval(() => {
  if (!gameStarted) return;
  if (Math.random() < 0.3) wiggleEars();
  if (Math.random() < 0.15) wagTail();
}, 4000);
</script>
